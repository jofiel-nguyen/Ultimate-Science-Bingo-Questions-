<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8.6 E Science Bingo</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <h1>8.6 E Science Bingo</h1>

    <div id="setup-area">
        <input type="text" id="player-name" placeholder="Enter Your Name">
        <button onclick="resetGame()">START GAME</button>
    </div>

    <div id="timer">Time Remaining: 05:00</div>

    <div id="question-area">
        <span id="q-text">Enter your name and click START!</span>
    </div>

    <div class="controls">
        <button id="draw-btn" onclick="drawQuestion()" style="display:none;">NEXT QUESTION ➜</button>
    </div>

    <div class="grid" id="bingo-board"></div>

    <div id="leaderboard">
        <h3>🏆 Hall of Fame</h3>
        <table id="score-table">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="score-body"></tbody>
        </table>
        <button id="admin-clear-btn" onclick="clearScores()" style="display:none;">Reset Records</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
